<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавить клиента</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:insert="~{components/sidebar :: sidebar}"></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <h1 class="mt-4">Новый клиент</h1>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/clients/add}" method="post">
                <div class="mb-3">
                    <label for="info" class="form-label">Информация о клиенте (JSON)</label>
                    <textarea class="form-control" id="info" name="info" rows="4"
                              placeholder='{"passport":"...", "email":"..."}'></textarea>
                </div>
                <h4>Первый профиль</h4>
                <div class="mb-3">
                    <label for="name" class="form-label">Ник</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Телефон (уникальный)</label>
                    <input type="text" class="form-control" id="phone" name="phone" required>
                </div>
                <div class="mb-3">
                    <label for="other" class="form-label">Дополнительно (JSON)</label>
                    <textarea class="form-control" id="other" name="other" rows="2"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Создать клиента</button>
                <a th:href="@{/clients}" class="btn btn-secondary">Отмена</a>
            </form>
        </main>
    </div>
</div>
</body>
</html>
