<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Операция #<span th:text="${operation.id}"></span></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:insert="~{components/sidebar :: sidebar}"></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <h1 class="mt-4">Операция #<span th:text="${operation.id}"></span></h1>

            <dl class="row">
                <dt class="col-sm-2">ID</dt>
                <dd class="col-sm-10" th:text="${operation.id}"></dd>
                <dt class="col-sm-2">Профиль</dt>
                <dd class="col-sm-10">
                    <a th:href="@{/profiles/{id}(id=${operation.profile.id})}"
                       th:text="${operation.profile.id} + ' (' + ${operation.profile.name} + ')'"></a>
                </dd>
                <dt class="col-sm-2">Клиент</dt>
                <dd class="col-sm-10">
                    <a th:href="@{/clients/{id}(id=${operation.profile.client.id})}"
                       th:text="${operation.profile.client.id}"></a>
                </dd>
                <dt class="col-sm-2">Тип</dt>
                <dd class="col-sm-10" th:text="${operation.type}"></dd>
                <dt class="col-sm-2">Услуга</dt>
                <dd class="col-sm-10">
                    <span th:if="${operation.service != null}">
                        <a th:href="@{/services/{id}(id=${operation.service.id})}"
                           th:text="${operation.service.id} + ' (' + ${operation.service.name} + ')'"></a>
                    </span>
                    <span th:unless="${operation.service != null}">—</span>
                </dd>
                <dt class="col-sm-2">Изменение баланса</dt>
                <dd class="col-sm-10" th:text="${operation.balanceChange}"></dd>
                <dt class="col-sm-2">Дата и время</dt>
                <dd class="col-sm-10" th:text="${timestampFormatted}"></dd>
                <dt class="col-sm-2">Описание</dt>
                <dd class="col-sm-10" th:text="${operation.description != null ? operation.description : '—'}"></dd>
            </dl>

            <a th:href="@{/operations}" class="btn btn-secondary">Назад к списку</a>
        </main>
    </div>
</div>
</body>
</html>
