<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Операции</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:insert="~{components/sidebar :: sidebar}"></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <h1 class="mt-4">Операции</h1>

            <!-- Фильтр -->
            <form th:action="@{/operations}" method="get" class="row g-3 mb-3">
                <div class="col-md-2">
                    <label for="profileId" class="form-label">ID профиля</label>
                    <input type="number" class="form-control" id="profileId" name="profileId"
                           th:value="${profileId}" placeholder="Любой" />
                </div>
                <div class="col-md-2">
                    <label for="clientId" class="form-label">ID клиента</label>
                    <input type="number" class="form-control" id="clientId" name="clientId"
                           th:value="${clientId}" placeholder="Любой" />
                </div>
                <div class="col-md-2">
                    <label for="type" class="form-label">Тип операции</label>
                    <select name="type" id="type" class="form-select">
                        <option value="">Все</option>
                        <option value="deposit" th:selected="${type == 'deposit'}">Пополнение</option>
                        <option value="withdrawal" th:selected="${type == 'withdrawal'}">Списание</option>
                        <option value="service_payment" th:selected="${type == 'service_payment'}">Платёж за услугу</option>
                        <option value="service_purchase" th:selected="${type == 'service_purchase'}">Покупка услуги</option>
                        <option value="service_cancellation" th:selected="${type == 'service_cancellation'}">Отказ от услуги</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="serviceId" class="form-label">ID услуги</label>
                    <input type="number" class="form-control" id="serviceId" name="serviceId"
                           th:value="${serviceId}" placeholder="Любая" />
                </div>
                <div class="col-md-2">
                    <label for="from" class="form-label">С (дата/время)</label>
                    <input type="datetime-local" class="form-control" id="from" name="from"
                           th:value="${from}" />
                </div>
                <div class="col-md-2">
                    <label for="to" class="form-label">По (дата/время)</label>
                    <input type="datetime-local" class="form-control" id="to" name="to"
                           th:value="${to}" />
                </div>
                <div class="col-md-2 align-self-end">
                    <button type="submit" class="btn btn-primary">Применить</button>
                    <a th:href="@{/operations/add}" class="btn btn-success">Добавить операцию</a>
                </div>
            </form>

            <!-- Таблица -->
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                    <tr>
                        <th>ID операции</th>
                        <th>Профиль</th>
                        <th>Клиент</th>
                        <th>Тип</th>
                        <th>Услуга</th>
                        <th>Описание</th>
                        <th>Дата/Время</th>
                        <th>Изменение баланса</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row : ${operations}">
                        <!-- 0:operation_id, 1:type, 2:timestamp, 3:balance_change, 4:description,
                             5:profile_id, 6:profile_name, 7:phone, 8:service_id, 9:service_name, 10:client_id -->
                        <td>
                            <a th:href="@{/operations/{id}(id=${row[0]})}" th:text="${row[0]}"></a>
                        </td>
                        <td>
                            <a th:href="@{/profiles/{id}(id=${row[5]})}" th:text="${row[5]} + ' (' + ${row[6]} + ')'"></a>
                        </td>
                        <td>
                            <a th:href="@{/clients/{id}(id=${row[10]})}" th:text="${row[10]}"></a>
                        </td>
                        <td th:text="${row[1]}"></td>
                        <td>
                            <span th:if="${row[8] != null}">
                                <a th:href="@{/services/{id}(id=${row[8]})}" th:text="${row[8]} + ' (' + ${row[9]} + ')'"></a>
                            </span>
                            <span th:unless="${row[8] != null}">—</span>
                        </td>
                        <td th:text="${row[4] != null ? row[4] : ''}"></td>
                        <td th:text="${#dates.format(row[2], 'dd.MM.yyyy HH:mm')}"></td>
                        <td th:text="${row[3]}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Пагинация -->
            <div th:insert="~{components/pagination :: pagination(
                baseUrl=${baseUrl},
                currentPage=${currentPage},
                totalPages=${totalPages},
                pageSize=${pageSize},
                sortBy=${sortBy},
                asc=${asc},
                search=${search}
            )}"></div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
