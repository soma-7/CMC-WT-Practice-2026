<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактировать услугу #<span th:text="${service.id}"></span></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:insert="~{components/sidebar :: sidebar}"></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <h1 class="mt-4">Услуга #<span th:text="${service.id}"></span></h1>

            <!-- Форма редактирования -->
            <form th:action="@{/services/{id}/edit(id=${service.id})}" method="post" class="mb-4">
                <div class="mb-3">
                    <label for="name" class="form-label">Название</label>
                    <input type="text" class="form-control" id="name" name="name" th:value="${service.name}" required>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Описание</label>
                    <textarea class="form-control" id="description" name="description" rows="3"
                              th:text="${service.description}"></textarea>
                </div>
                <div class="mb-3">
                    <label for="includes" class="form-label">Теги (includes) JSON</label>
                    <textarea class="form-control" id="includes" name="includes" rows="4"
                              th:text="${service.includes}"></textarea>
                </div>
                <div class="mb-3">
                    <label for="other" class="form-label">Дополнительно (other) JSON</label>
                    <textarea class="form-control" id="other" name="other" rows="4"
                              th:text="${service.other}"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                <a th:href="@{/services}" class="btn btn-secondary">Назад к списку</a>
            </form>

            <!-- Удаление услуги -->
            <form th:action="@{/services/{id}/delete(id=${service.id})}" method="post"
                  onsubmit="return confirm('Удалить услугу? Если на неё есть ссылки в операциях, удаление может быть ограничено.')">
                <button type="submit" class="btn btn-danger">Удалить услугу</button>
            </form>
        </main>
    </div>
</div>
</body>
</html>
