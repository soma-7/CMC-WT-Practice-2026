<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавить услугу</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:insert="~{components/sidebar :: sidebar}"></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <h1 class="mt-4">Новая услуга</h1>

            <form th:action="@{/services/add}" method="post">
                <div class="mb-3">
                    <label for="name" class="form-label">Название</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Описание</label>
                    <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label for="includes" class="form-label">Теги (includes) JSON</label>
                    <textarea class="form-control" id="includes" name="includes" rows="3"
                              placeholder='{"sms": "100_pieces", "internet": "10GB"}'></textarea>
                </div>
                <div class="mb-3">
                    <label for="other" class="form-label">Дополнительно (other) JSON</label>
                    <textarea class="form-control" id="other" name="other" rows="3"
                              placeholder='{"price": "500", "discount": "10%"}'></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Создать услугу</button>
                <a th:href="@{/services}" class="btn btn-secondary">Отмена</a>
            </form>
        </main>
    </div>
</div>
</body>
</html>
