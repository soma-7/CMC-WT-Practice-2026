<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список профилей</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:insert="~{components/sidebar :: sidebar}"></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <h1 class="mt-4">Профили</h1>

            <!-- Поиск и сортировка -->
            <form th:action="@{/profiles}" method="get" class="row g-3 mb-3">
                <div class="col-auto">
                    <input type="text" name="search" class="form-control" placeholder="Поиск по имени или телефону"
                           th:value="${search}" />
                </div>
                <div class="col-auto">
                    <select name="sortBy" class="form-select">
                        <option value="client_id" th:selected="${sortBy == 'client_id'}">ID клиента</option>
                        <option value="name" th:selected="${sortBy == 'name'}">Имя</option>
                        <option value="balance" th:selected="${sortBy == 'balance'}">Баланс</option>
                        <option value="created_at" th:selected="${sortBy == 'created_at'}">Дата создания</option>
                    </select>
                </div>
                <div class="col-auto">
                    <select name="asc" class="form-select">
                        <option value="true" th:selected="${asc}">По возрастанию</option>
                        <option value="false" th:selected="${!asc}">По убыванию</option>
                    </select>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Применить</button>
                </div>
                <div class="col-auto">
                    <a th:href="@{/profiles/add}" class="btn btn-success">Добавить профиль</a>
                </div>
            </form>

            <!-- Таблица -->
            <table class="table table-striped table-hover">
                <thead>
                <tr>
                    <th>ID профиля</th>
                    <th>ID клиента</th>
                    <th>Имя</th>
                    <th>Телефон</th>
                    <th>Баланс</th>
                    <th>Дата создания</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row : ${profiles}">
                    <td>
                        <a th:href="@{/profiles/{id}(id=${row[0]})}" th:text="${row[0]}"></a>
                    </td>
                    <td>
                        <a th:href="@{/clients/{id}(id=${row[6]})}" th:text="${row[6]}"></a>
                    </td>
                    <td th:text="${row[1]}"></td>
                    <td th:text="${row[2]}"></td>
                    <td th:text="${row[3]}"></td>
                    <td th:text="${row[5]}"></td>
                </tr>
                </tbody>
            </table>

            <!-- Пагинация -->
            <div th:insert="~{components/pagination :: pagination(
                baseUrl='/profiles',
                currentPage=${currentPage},
                totalPages=${totalPages},
                pageSize=${pageSize},
                sortBy=${sortBy},
                asc=${asc},
                search=${search}
            )}"></div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
