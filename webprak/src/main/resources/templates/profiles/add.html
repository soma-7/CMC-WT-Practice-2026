<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавить профиль</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:insert="~{components/sidebar :: sidebar}"></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <h1 class="mt-4">Новый профиль</h1>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/profiles/add}" method="post">
                <div class="mb-3">
                    <label for="clientId" class="form-label">ID клиента</label>
                    <input type="number" class="form-control" id="clientId" name="clientId" required>
                </div>
                <div class="mb-3">
                    <label for="name" class="form-label">Ник</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Телефон (уникальный)</label>
                    <input type="text" class="form-control" id="phone" name="phone" required>
                </div>
                <div class="mb-3">
                    <label for="other" class="form-label">Дополнительная информация (JSON)</label>
                    <textarea class="form-control" id="other" name="other" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Создать профиль</button>
                <a th:href="@{/profiles}" class="btn btn-secondary">Отмена</a>
            </form>
        </main>
    </div>
</div>
</body>
</html>
