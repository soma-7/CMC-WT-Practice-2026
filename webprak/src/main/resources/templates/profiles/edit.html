<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Редактировать профиль</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <div th:insert="~{components/sidebar :: sidebar}"></div>

    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
      <h1 class="mt-4">Профиль #<span th:text="${profile.id}"></span></h1>

      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

      <!-- Форма редактирования -->
      <form th:action="@{/profiles/{id}/edit(id=${profile.id})}" method="post" class="mb-4">
        <div class="mb-3">
          <label class="form-label">ID клиента (не изменяется)</label>
          <input type="text" class="form-control" th:value="${profile.client.id}" readonly>
        </div>
        <div class="mb-3">
          <label for="name" class="form-label">Ник</label>
          <input type="text" class="form-control" id="name" name="name" th:value="${profile.name}" required>
        </div>
        <div class="mb-3">
          <label for="phone" class="form-label">Телефон</label>
          <input type="text" class="form-control" id="phone" name="phone" th:value="${profile.phone}" required>
        </div>
        <div class="mb-3">
          <label for="other" class="form-label">Дополнительно (JSON)</label>
          <textarea class="form-control" id="other" name="other" rows="3" th:text="${profile.other}"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить изменения</button>
        <a th:href="@{/profiles}" class="btn btn-secondary">Назад к списку</a>
      </form>

      <!-- Удаление профиля -->
      <form th:action="@{/profiles/{id}/delete(id=${profile.id})}" method="post"
            onsubmit="return confirm('Вы уверены, что хотите удалить этот профиль?')">
        <button type="submit" class="btn btn-danger">Удалить профиль</button>
      </form>
    </main>
  </div>
</div>
</body>
</html>
